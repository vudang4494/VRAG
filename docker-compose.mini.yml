# ==============================================================================
# Enterprise RAG Stack — Mac Mini M4 Optimized (24GB RAM)
# Hardware: Apple M4 (10-core, 24GB unified) + Ollama + Qdrant + Neo4j
# Stack: Ollama (Qwen3.5-4B Q4_K_M GGUF, Metal GPU) + BGE-M3 Embeddings
# Strategy: Drop Langfuse/ClickHouse/Prometheus/Grafana for resource savings
# Total RAM budget: ~9.5GB (out of 24GB)
# ==============================================================================

networks:
  rag-internal:
    driver: bridge
    name: rag-internal

volumes:
  qdrant_data:
    driver: local
  neo4j_data:
    driver: local
  redis_data:
    driver: local

services:

  # ============================================================================
  # Qdrant — Vector DB (minimal footprint)
  # M4 handles queries fast, no need for large cache
  # ============================================================================
  qdrant:
    image: qdrant/qdrant:v1.13.0
    container_name: rag-qdrant
    restart: unless-stopped
    environment:
      - QDRANT__SERVICE__ENABLE_TLS=false
      - QDRANT__LOG_LEVEL=WARN
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    healthcheck:
      test: ["CMD", "/qdrant/qdrant", "--version"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rag-internal
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ============================================================================
  # Neo4j — Knowledge Graph (reduced footprint)
  # Memory: 1GB heap + 256MB pagecache
  # ============================================================================
  neo4j:
    image: neo4j:5.26-community
    container_name: rag-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=none
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_max__size=768M
      - NEO4J_dbms_memory_pagecache_size=256M
      - NEO4J_server_default__listen__address=0.0.0.0
      - NEO4J_server_memory_heap_initial__size=256M
      - NEO4J_dbms_transaction_timeout=30s
      - NEO4J_dbms_lock_acquisition_timeout=10s
      - NEO4J_dbms.transaction.concurrent.maximum=20
      - NEO4J_dbms.transaction.bookmark_ready_timeout=5s
      - NEO4J_dbms.checkpoint.interval.time=300s
      - NEO4J_dbms.checkpoint.interval.tx=1000
    volumes:
      - neo4j_data:/data
      - ./scripts:/scripts:ro
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - rag-internal
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ============================================================================
  # Redis — Semantic Cache (minimal, LRU eviction)
  # Only stores query embedding → result mappings
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:-ragredis2024}
      - --maxmemory
      - 128mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
      - --tcp-backlog
      - "64"
      - --timeout
      - "15"
      - --tcp-keepalive
      - "30"
      - --lazyfree-lazy-eviction
      - "yes"
      - --lazyfree-lazy-expire
      - "yes"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ragredis2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-internal
    deploy:
      resources:
        limits:
          memory: 192M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  # ============================================================================
  # RAG API — FastAPI Application (lightweight, uvloop)
  # Ollama runs NATIVELY on Mac (Metal GPU) not in Docker
  # ============================================================================
  rag-api:
    build:
      context: .
      dockerfile: api/Dockerfile.mini
    container_name: rag-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # LLM — Ollama runs on HOST (Metal GPU), not container.
      # All three tags must be set together and must match src/config.py: ollama_model does
      # NOT inherit HEAVY_LLM, so setting only OLLAMA_MODEL splits the roles — light/heavy
      # would run the config default while bare ollama_chat() calls hit this one. This file
      # pinned qwen3.5:9b (never installed) and set neither LIGHT_LLM nor HEAVY_LLM, which
      # is exactly that split, with a 404 on the bare path.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=gemma4:e4b
      - LIGHT_LLM=gemma4:e4b
      - HEAVY_LLM=gemma4:e4b
      - OLLAMA_EMBED_MODEL=bge-m3
      - OLLAMA_EMBED_URL=http://host.docker.internal:11434
      # Vector DB
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=enterprise_kb
      # Knowledge Graph
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=
      # Cache
      - REDIS_URL=redis://default:${REDIS_PASSWORD:-ragredis2024}@redis:6379/0
      # App tuning — OPTIMIZED for Mac Mini M4
      - APP_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_CONCURRENT_REQUESTS=6
      - REQUEST_TIMEOUT_S=120
      - EMBED_BATCH_SIZE=32
      - EMBED_CONCURRENT_LIMIT=3
      - SEMANTIC_CACHE_TTL=7200
      - ENABLE_SEMANTIC_CACHE=true
    ports:
      - "127.0.0.1:8800:8800"
    networks:
      - rag-internal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8800/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "3"

  # ============================================================================
  # Dashboard — Gradio Visualization (lightweight)
  # ============================================================================
  rag-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile.mini
    container_name: rag-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:7860:7860"
    environment:
      - API_BASE=http://rag-api:8800
      - OLLAMA_BASE=http://host.docker.internal:11434
      - NEO4J_URL=http://neo4j:7474
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - /tmp/rag_graphs:/tmp
    networks:
      - rag-internal
    depends_on:
      rag-api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"
