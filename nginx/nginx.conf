# ==============================================================================
# Nginx reverse proxy config cho Enterprise RAG Stack
# Bind external traffic vào internal services
# ==============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 100M;  # cho phép upload PDF lớn

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting zones
    # - Chat completions: 30 req/min mỗi IP
    # - Embed/upload: 100 req/min mỗi IP
    # - Health: không limit
    limit_req_zone $binary_remote_addr zone=chat:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=ingest:10m rate=100r/m;

    # Connection limit cho mỗi IP
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    # Upstreams
    upstream webui_backend {
        server open-webui:8080;
        keepalive 32;
    }

    upstream api_backend {
        server rag-api:8800;
        keepalive 64;
    }

    upstream langfuse_backend {
        server langfuse:3000;
        keepalive 16;
    }

    upstream grafana_backend {
        server grafana:3000;
        keepalive 16;
    }

    # ============================================================
    # HTTP → HTTPS redirect (uncomment khi đã có SSL cert)
    # ============================================================
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    # ============================================================
    # HTTP server (development / internal)
    # ============================================================
    server {
        listen 80 default_server;
        server_name _;

        # Tăng timeout vì LLM streaming có thể chậm
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        # Disable buffering cho SSE streaming
        proxy_buffering off;
        proxy_cache off;

        # Headers chung
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Connection limit
        limit_conn perip 20;

        # ============ Open WebUI (frontend) — default ============
        location / {
            proxy_pass http://webui_backend;

            # WebSocket support cho streaming chat
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ============ Direct API access ============
        location /api/ {
            limit_req zone=chat burst=10 nodelay;
            proxy_pass http://api_backend;
        }

        location /api/ingest/ {
            limit_req zone=ingest burst=20 nodelay;
            client_max_body_size 500M;  # PDF lớn
            proxy_pass http://api_backend/ingest/;
        }

        # ============ Admin tools (rate-limited, nên đặt sau VPN/auth) ============
        location /langfuse/ {
            proxy_pass http://langfuse_backend/;
        }

        location /grafana/ {
            proxy_pass http://grafana_backend/;
        }

        # ============ Health ============
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    # ============================================================
    # HTTPS server (uncomment khi có cert tại /etc/nginx/ssl/)
    # ============================================================
    # server {
    #     listen 443 ssl http2 default_server;
    #     server_name rag.yourcompany.com;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # ... duplicate locations từ server :80 trên ...
    # }
}
