global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    monitor: 'enterprise-rag'

scrape_configs:
  # Ollama (if metrics exposed) — Ollama không có /metrics mặc định
  # Bật bằng: export OLLAMA_METRICS=true trước khi chạy ollama serve
  # - job_name: 'ollama'
  #   static_configs:
  #     - targets: ['ollama:11434']
  #   metrics_path: /api/metrics

  # RAG API (FastAPI với prometheus-fastapi-instrumentator)
  - job_name: 'rag-api'
    static_configs:
      - targets: ['rag-api:8800']
    metrics_path: /metrics

  # Prometheus self-monitor
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
