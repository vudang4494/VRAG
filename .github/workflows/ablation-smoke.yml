name: Ablation Smoke

on:
  schedule:
    # Run every Saturday at 2 AM — no nightly breakages
    - cron: "0 2 * * 6"
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant ID to evaluate"
        required: false
        default: "eval"

jobs:
  smoke:
    name: Ablation smoke (${{ inputs.tenant || 'eval' }} tenant)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      docker:
        image: docker:24-cli
        options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose up -d
          echo "Waiting for services to be healthy..."
          sleep 45

      - name: Check services
        run: |
          echo "=== Service Status ==="
          docker compose ps
          echo ""
          echo "=== API Health ==="
          curl -s http://localhost:8800/health | python3 -m json.tool || echo "API not ready"
          echo ""
          echo "=== Ollama ==="
          curl -s http://localhost:11434/api/tags | python3 -c "import sys,json; d=json.load(sys.stdin); [print(' ',m['name']) for m in d.get('models',[])]" 2>/dev/null || echo "Ollama not reachable"

      - name: Run verification pipeline
        run: |
          python3 scripts/verify_pipeline.py --tenant ${{ inputs.tenant || 'eval' }}

      - name: Capture results
        if: always()
        run: |
          ls -lh eval/results/ 2>/dev/null || echo "No results yet"
          docker logs rag-api --tail 30 2>/dev/null | grep -E "(ERROR|WARN|error)" | head -10 || true

      - name: Stop stack
        if: always()
        run: docker compose down --remove-orphans
