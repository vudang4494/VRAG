name: Ablation Smoke

on:
  schedule:
    # Run every Saturday at 2 AM — no nightly breakages
    - cron: "0 2 * * 6"
  workflow_dispatch:
    inputs:
      tenant:
        description: "Tenant ID to evaluate"
        required: false
        default: "eval"
      max_queries:
        description: "Max queries (0 = full benchmark)"
        required: false
        default: "3"

jobs:
  smoke:
    name: Ablation smoke (${{ inputs.max_queries || '3' }} queries)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      docker:
        image: docker:24-cli
        options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose up -d
          echo "Waiting for services to be healthy..."
          sleep 45

      - name: Check services
        run: |
          echo "=== Service Status ==="
          docker compose ps
          echo ""
          echo "=== API Health ==="
          curl -s http://localhost:8800/api/v3/health | python3 -m json.tool || echo "API not ready"
          echo ""
          echo "=== Ollama ==="
          curl -s http://host.docker.internal:11434/api/tags | python3 -c "import sys,json; d=json.load(sys.stdin); [print(' ',m['name']) for m in d.get('models',[])]" 2>/dev/null || echo "Ollama not reachable"

      - name: Run ablation smoke (3 queries)
        if: github.event.inputs.max_queries == '' || github.event.inputs.max_queries == '3'
        run: |
          MAX_Q=${{ inputs.max_queries || 3 }}
          python3 scripts/ablation_eval.py \
            --tenant ${{ inputs.tenant || 'eval' }} \
            --skip C4_v3_react C7_hefr_entity_pivot \
            2>&1 | tee eval/results/smoke_$(date +%Y%m%d).log

      - name: Capture results
        if: always()
        run: |
          ls -lh eval/results/ 2>/dev/null || echo "No results yet"
          docker logs rag-api --tail 30 2>/dev/null | grep -E "(ERROR|WARN|error)" | head -10 || true

      - name: Stop stack
        if: always()
        run: docker compose down --remove-orphans
